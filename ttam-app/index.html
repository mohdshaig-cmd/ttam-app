<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>TTAM – Table Tennis Association of Maldives</title>
    <meta name="description" content="Official member portal – book tables, manage memberships, track tournaments" />
    <meta name="theme-color" content="#1a6b1a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TTAM" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'DM Sans', system-ui, sans-serif; background: #f7f9f7; }
      #root { min-height: 100vh; }
      #app-loader { position: fixed; inset: 0; background: #0f4a0f; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.4s; }
      #app-loader.hidden { opacity: 0; pointer-events: none; }
      #app-loader svg { animation: pulse 1.5s ease-in-out infinite; }
      #app-loader p { color: rgba(255,255,255,0.8); font-size: 13px; margin-top: 16px; }
      @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(0.95); opacity: 0.8; } }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <svg viewBox="0 0 80 80" width="72" height="72" fill="none">
        <circle cx="40" cy="40" r="38" fill="#1a6b1a" stroke="#2d8a2d" stroke-width="2"/>
        <ellipse cx="41" cy="22" rx="13" ry="14" fill="#2d8a2d" stroke="#fff" stroke-width="1.5"/>
        <rect x="36" y="35" width="10" height="14" rx="3" fill="#fff"/>
        <rect x="12" y="49" width="56" height="7" rx="2" fill="#fff"/>
        <rect x="18" y="56" width="5" height="12" rx="1.5" fill="#fff"/>
        <rect x="57" y="56" width="5" height="12" rx="1.5" fill="#fff"/>
        <circle cx="60" cy="17" r="6" fill="#fff"/>
      </svg>
      <p>Loading TTAM…</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('/sw.js').catch(() => {}) })
      }
      const obs = new MutationObserver(() => {
        if (document.getElementById('root')?.children.length > 0) {
          setTimeout(() => {
            const l = document.getElementById('app-loader')
            if (l) { l.classList.add('hidden'); setTimeout(() => l.remove(), 400) }
          }, 300)
          obs.disconnect()
        }
      })
      document.addEventListener('DOMContentLoaded', () => {
        obs.observe(document.getElementById('root'), { childList: true, subtree: true })
      })
    </script>
  </body>
</html>
